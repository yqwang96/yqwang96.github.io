---
layout: default
---
<article class="content-frame reading-frame" itemscope itemtype="http://schema.org/CreativeWork">
  <header class="page-heading">
    <p class="page-heading__eyebrow">{% if page.collection %}{{ page.collection }}{% else %}writing{% endif %}</p>
    <h1 itemprop="headline">{{ page.title }}</h1>
    {% if page.date %}<p class="reading-meta">{{ page.date | date: "%B %Y" }}{% if page.venue %} · {{ page.venue }}{% endif %}</p>{% endif %}
  </header>
  <section class="page__content reading-content" itemprop="text">
    {{ content }}
    {% if page.link %}<p><a href="{{ page.link }}" class="btn btn--primary">Direct link</a></p>{% endif %}
  </section>
</article>
